<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { background:#13100D; display:flex; align-items:center; justify-content:center; min-height:100vh; gap:60px; font-family:Georgia,serif; }
  .stamp { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .box { width:42px; height:42px; display:flex; align-items:center; justify-content:center; font-family:Georgia,serif; font-size:14px; color:#F8F5F0; line-height:1.2; text-align:center; }
  .old { background:rgba(192,57,43,0.88); transform:rotate(-4deg); box-shadow:1px 2px 8px rgba(192,57,43,0.35); }
  .new { background:#1A1410; }
  label { color:#8C7B6A; font-size:11px; letter-spacing:0.08em; }
</style></head><body>
  <div class="stamp"><div class="box old">声<br>音</div><label>BEFORE</label></div>
  <div class="stamp"><div class="box new">こ<br>え</div><label>AFTER — こえ (koe)</label></div>
</body></html>
